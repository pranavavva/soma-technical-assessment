[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-json" },
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "eslint", name = "eslint", entry = "npx eslint --fix --no-warn-ignored", language = "system", types_or = [
    "javascript",
    "jsx",
    "ts",
    "tsx",
  ], pass_filenames = true },
  { id = "prettier", name = "prettier", entry = "npx prettier --write --ignore-unknown", language = "system", types_or = [
    "javascript",
    "jsx",
    "ts",
    "tsx",
    "css",
    "json",
    "markdown",
  ], pass_filenames = true },
]
